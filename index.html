<h2 class="sr-only">Top-down honička: řízení auta Opel před policií, se srovnáním rychlosti nárazu, joypadem a fullscreen režimem</h2>
<div style="display:flex; align-items:center; gap:16px; margin-bottom:8px; font-size:14px; color:var(--text-secondary); flex-wrap:wrap;">
  <div>Keanu: <span id="playerScoreOut" style="font-weight:600; color:#5fb36a;">0</span></div>
  <div>Policie: <span id="policeScoreOut" style="font-weight:600; color:#c95b5b;">0</span></div>
  <div>Rychlost: <span id="speedOut" style="font-weight:500; color:var(--text-primary);">0</span></div>
  <div id="msgOut" style="margin-left:auto; font-weight:500; color:var(--text-primary); min-height:18px;"></div>
</div>
<div id="wrapper" style="position:relative; width:100%; height:0; padding-bottom:68.75%; border-radius:12px; overflow:hidden; border:0.5px solid var(--border); background:#3a3d3f;">
  <canvas id="game" style="position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;"></canvas>
  <button id="btnFull" aria-label="Fullscreen" style="position:absolute; top:10px; right:10px; width:44px; height:44px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.35); background:rgba(20,20,20,0.6); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center;"><i class="ti ti-maximize" id="fullIcon" aria-hidden="true"></i></button>
  <div style="position:absolute; left:14px; bottom:14px; width:170px; height:170px; user-select:none;">
    <button id="btnUp" style="position:absolute; left:55px; top:0; width:60px; height:60px; border-radius:12px; border:0.5px solid rgba(255,255,255,0.35); background:rgba(30,30,32,0.65); color:#fff; font-size:26px; touch-action:none;"><i class="ti ti-chevron-up" aria-hidden="true"></i></button>
    <button id="btnLeft" style="position:absolute; left:0; top:55px; width:60px; height:60px; border-radius:12px; border:0.5px solid rgba(255,255,255,0.35); background:rgba(30,30,32,0.65); color:#fff; font-size:26px; touch-action:none;"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
    <button id="btnDown" style="position:absolute; left:55px; top:110px; width:60px; height:60px; border-radius:12px; border:0.5px solid rgba(255,255,255,0.35); background:rgba(30,30,32,0.65); color:#fff; font-size:26px; touch-action:none;"><i class="ti ti-chevron-down" aria-hidden="true"></i></button>
    <button id="btnRight" style="position:absolute; left:110px; top:55px; width:60px; height:60px; border-radius:12px; border:0.5px solid rgba(255,255,255,0.35); background:rgba(30,30,32,0.65); color:#fff; font-size:26px; touch-action:none;"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
  </div>
</div>
<script>
(function(){
const wrapper = document.getElementById('wrapper');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 640, H = 440;
const world = {size: 2400, block: 300, road: 80};

function resizeCanvas(){
  const rect = wrapper.getBoundingClientRect();
  W = Math.max(200, Math.round(rect.width));
  H = Math.max(150, Math.round(rect.height));
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const btnFull = document.getElementById('btnFull');
const fullIcon = document.getElementById('fullIcon');
btnFull.addEventListener('click', () => {
  if(!document.fullscreenElement){
    (wrapper.requestFullscreen || wrapper.webkitRequestFullscreen || function(){}).call(wrapper);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
  }
});
document.addEventListener('fullscreenchange', () => {
  const isFull = !!document.fullscreenElement;
  if(isFull){
    wrapper.style.paddingBottom = '0';
    wrapper.style.height = '100vh';
    wrapper.style.borderRadius = '0';
    fullIcon.className = 'ti ti-minimize';
  } else {
    wrapper.style.height = '0';
    wrapper.style.paddingBottom = '68.75%';
    wrapper.style.borderRadius = '12px';
    fullIcon.className = 'ti ti-maximize';
  }
  setTimeout(resizeCanvas, 50);
});

function isOnRoad(x,y){
  const b = world.block, r = world.road;
  const mx = ((x % b) + b) % b;
  const my = ((y % b) + b) % b;
  return mx < r || my < r;
}
function normAngle(a){ return Math.atan2(Math.sin(a), Math.cos(a)); }

const car = {x: 1200, y: 1200, angle: -Math.PI/2, speed: 0, w: 40, h: 66};
const police = {x: 1200, y: 1200, angle: -Math.PI/2, speed: 2, w: 38, h: 64};
let playerScore = 0, policeScore = 0, lastCollision = -Infinity, message = '', msgUntil = 0;

function placePoliceBehindPlayer(dist){
  const b = world.block, r = world.road;
  const mx = ((car.x % b) + b) % b;
  const my = ((car.y % b) + b) % b;
  if(mx < r){
    const dir = Math.sin(car.angle) >= 0 ? 1 : -1;
    police.x = car.x;
    police.y = car.y - dir * dist;
  } else {
    const dir = Math.cos(car.angle) >= 0 ? 1 : -1;
    police.x = car.x - dir * dist;
    police.y = car.y;
  }
  police.angle = Math.atan2(car.y - police.y, car.x - police.x);
  police.speed = 2;
}
placePoliceBehindPlayer(380);
let stuckCheckTime = performance.now(), stuckX = police.x, stuckY = police.y;

const keys = {};
window.addEventListener('keydown', e => { keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key]=false; });

function bindTouch(id, key){
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); keys[key]=true; };
  const off = e => { e.preventDefault(); keys[key]=false; };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindTouch('btnUp','ArrowUp');
bindTouch('btnDown','ArrowDown');
bindTouch('btnLeft','ArrowLeft');
bindTouch('btnRight','ArrowRight');

function updatePlayer(){
  const accel = 0.28, maxSpeed = 5.2, friction = 0.05, turnSpeed = 0.04;
  const up = keys['ArrowUp']||keys['w']||keys['W'];
  const down = keys['ArrowDown']||keys['s']||keys['S'];
  const left = keys['ArrowLeft']||keys['a']||keys['A'];
  const right = keys['ArrowRight']||keys['d']||keys['D'];

  if(up) car.speed += accel;
  if(down) car.speed -= accel;
  car.speed *= (1-friction);
  car.speed = Math.max(-maxSpeed*0.6, Math.min(maxSpeed, car.speed));

  if(Math.abs(car.speed) > 0.05){
    const dir = car.speed > 0 ? 1 : -1;
    if(left) car.angle -= turnSpeed * dir;
    if(right) car.angle += turnSpeed * dir;
  }

  const nx = car.x + Math.cos(car.angle) * car.speed;
  const ny = car.y + Math.sin(car.angle) * car.speed;
  if(isOnRoad(nx, car.y)) car.x = nx;
  if(isOnRoad(car.x, ny)) car.y = ny;

  document.getElementById('speedOut').textContent = Math.round(Math.abs(car.speed)*20);
}

function updatePolice(){
  const desired = Math.atan2(car.y-police.y, car.x-police.x);
  const da = normAngle(desired - police.angle);
  police.angle += Math.max(-0.035, Math.min(0.035, da));
  police.speed = Math.min(4.6, police.speed + 0.2);
  const nx = police.x + Math.cos(police.angle) * police.speed;
  const ny = police.y + Math.sin(police.angle) * police.speed;
  let moved = false;
  if(isOnRoad(nx, police.y)){ police.x = nx; moved = true; } else { police.speed *= 0.4; }
  if(isOnRoad(police.x, ny)){ police.y = ny; moved = true; } else { police.speed *= 0.4; }
  if(!moved) police.speed *= 0.5;
}

function checkStuck(){
  const now = performance.now();
  if(now - stuckCheckTime > 1500){
    const moved = Math.hypot(police.x-stuckX, police.y-stuckY);
    if(moved < 25) placePoliceBehindPlayer(340);
    stuckCheckTime = now; stuckX = police.x; stuckY = police.y;
  }
}

function setMessage(text){
  message = text;
  msgUntil = performance.now() + 1600;
  document.getElementById('msgOut').textContent = text;
}

function checkCollision(){
  const dx = car.x - police.x, dy = car.y - police.y;
  const dist = Math.hypot(dx, dy);
  const thresh = (car.w + police.w) / 2 * 0.85;
  const now = performance.now();
  if(dist < thresh && now - lastCollision > 1400){
    lastCollision = now;
    const ux = dx / dist, uy = dy / dist;
    const playerVX = Math.cos(car.angle) * car.speed, playerVY = Math.sin(car.angle) * car.speed;
    const policeVX = Math.cos(police.angle) * police.speed, policeVY = Math.sin(police.angle) * police.speed;
    const playerToward = -(playerVX * ux + playerVY * uy);
    const policeToward = policeVX * ux + policeVY * uy;
    const margin = 0.4;
    if(playerToward > policeToward + margin && playerToward > 1){
      playerScore++;
      document.getElementById('playerScoreOut').textContent = playerScore;
      setMessage('Keanu napálil policii! +1');
    } else if(policeToward > playerToward + margin && policeToward > 1){
      policeScore++;
      document.getElementById('policeScoreOut').textContent = policeScore;
      setMessage('Policie napálila Keanu! +1 pro ně');
    } else {
      setMessage('Náraz bez jasného vítěze');
    }
    placePoliceBehindPlayer(340);
  }
  if(performance.now() > msgUntil && message !== ''){
    message = '';
    document.getElementById('msgOut').textContent = '';
  }
}

function drawCity(camX, camY){
  const b = world.block, r = world.road;
  const startX = Math.floor((camX-W)/b)*b, endX = camX+W;
  const startY = Math.floor((camY-H)/b)*b, endY = camY+H;
  for(let bx=startX; bx<endX; bx+=b){
    for(let by=startY; by<endY; by+=b){
      const sx = bx - camX + W/2, sy = by - camY + H/2;
      ctx.fillStyle = '#2f3234';
      ctx.fillRect(sx, sy, r, world.size);
      ctx.fillRect(sx, sy, world.size, r);
      const bColors = ['#7a5a4a','#5a6a4a','#4a5a6a','#6a5a5a'];
      ctx.fillStyle = bColors[(Math.floor(bx/b)+Math.floor(by/b))%bColors.length];
      ctx.fillRect(sx+r+8, sy+r+8, b-r-16, b-r-16);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for(let wx=0; wx<3; wx++) for(let wy=0; wy<3; wy++){
        ctx.fillRect(sx+r+20+wx*(b-r-40)/3, sy+r+20+wy*(b-r-40)/3, 14, 14);
      }
      ctx.strokeStyle = 'rgba(255,220,120,0.4)';
      ctx.setLineDash([10,10]);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx+r/2, sy); ctx.lineTo(sx+r/2, sy+world.size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, sy+r/2); ctx.lineTo(sx+world.size, sy+r/2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawFace(r){
  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  ctx.fillStyle = '#e8bd93';
  ctx.fillRect(-r,-r,r*2,r*2);
  ctx.fillStyle = '#d9a878';
  ctx.beginPath();
  ctx.ellipse(r*0.35, r*0.1, r*0.55, r*0.75, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#3a2a20';
  ctx.beginPath();
  ctx.ellipse(-r*0.35, -r*0.4, r*0.22, r*0.09, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(r*0.28, -r*0.42, r*0.24, r*0.09, 0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-r*0.32,-r*0.18,r*0.13,r*0.09,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r*0.3,-r*0.2,r*0.13,r*0.09,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4a7ea6';
  ctx.beginPath(); ctx.arc(-r*0.30,-r*0.17,r*0.06,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.32,-r*0.19,r*0.06,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1c130d';
  ctx.beginPath(); ctx.arc(-r*0.30,-r*0.17,r*0.028,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.32,-r*0.19,r*0.028,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,80,55,0.5)';
  ctx.lineWidth = r*0.02;
  ctx.beginPath(); ctx.moveTo(-r*0.45,-r*0.05); ctx.quadraticCurveTo(-r*0.55,r*0.1,-r*0.42,r*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.5,-r*0.02); ctx.quadraticCurveTo(r*0.62,r*0.15,r*0.5,r*0.32); ctx.stroke();
  ctx.strokeStyle = '#c99a72';
  ctx.lineWidth = r*0.035;
  ctx.beginPath();
  ctx.moveTo(-r*0.05,-r*0.15);
  ctx.quadraticCurveTo(-r*0.1,r*0.12,-r*0.02,r*0.2);
  ctx.lineTo(r*0.1,r*0.2);
  ctx.stroke();
  ctx.fillStyle = '#c0654f';
  ctx.beginPath();
  ctx.ellipse(0,r*0.42,r*0.28,r*0.09,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(-r*0.16,r*0.37,r*0.32,r*0.035);
  ctx.fillStyle = '#3a2a20';
  ctx.fillRect(-r*4,-r*4,r*8,r*0.55);
  ctx.restore();
  ctx.strokeStyle = '#2a1c14';
  ctx.lineWidth = r*0.04;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
}

function carBodyPath(w,h){
  ctx.beginPath();
  ctx.moveTo(-w/2+6, h/2);
  ctx.lineTo(w/2-6, h/2);
  ctx.lineTo(w/2, -h/2+12);
  ctx.lineTo(w/2-9, -h/2);
  ctx.lineTo(-w/2+9, -h/2);
  ctx.lineTo(-w/2, -h/2+12);
  ctx.closePath();
}

function drawCar(){
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.rotate(car.angle + Math.PI/2);
  ctx.fillStyle = '#b8bec2';
  carBodyPath(car.w, car.h);
  ctx.fill();
  ctx.strokeStyle = '#8b9296'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#1c2a3a';
  ctx.beginPath();
  ctx.roundRect(-car.w/2+7, -14, car.w-14, 34, 6);
  ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.roundRect(-car.w/2+7, -14, car.w-14, 34, 6); ctx.clip();
  drawFace(car.w*0.34);
  ctx.restore();
  ctx.fillStyle = '#111';
  ctx.fillRect(-8,-car.h/2-3,5,8);
  ctx.fillRect(3,-car.h/2-3,5,8);
  ctx.fillStyle = '#7a1f1f';
  ctx.fillRect(-8,car.h/2-4,5,6);
  ctx.fillRect(3,car.h/2-4,5,6);
  ctx.save();
  ctx.font = 'bold 9px sans-serif';
  ctx.fillStyle = '#22282c';
  ctx.textAlign = 'center';
  ctx.translate(0, car.h/2-13);
  ctx.rotate(Math.PI);
  ctx.fillText('OPEL', 0, 0);
  ctx.restore();
  ctx.restore();
}

function drawPolice(){
  const sx = police.x - car.x + W/2;
  const sy = police.y - car.y + H/2;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(police.angle + Math.PI/2);
  ctx.fillStyle = '#f2f2f0';
  carBodyPath(police.w, police.h);
  ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#1e3a8f';
  ctx.beginPath();
  ctx.moveTo(-police.w/2, -6);
  ctx.lineTo(police.w/2, 6);
  ctx.lineTo(police.w/2, 16);
  ctx.lineTo(-police.w/2, 4);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#12151a';
  ctx.fillRect(-police.w/2+6, -13, police.w-12, 30);
  const blink = Math.floor(Date.now()/300) % 2 === 0;
  ctx.fillStyle = blink ? '#e53939' : '#3a6fe0';
  ctx.fillRect(-10, -police.h/2-6, 8, 8);
  ctx.fillStyle = blink ? '#3a6fe0' : '#e53939';
  ctx.fillRect(2, -police.h/2-6, 8, 8);
  ctx.fillStyle = '#111';
  ctx.fillRect(-8,-police.h/2-3,5,6);
  ctx.fillRect(3,-police.h/2-3,5,6);
  ctx.save();
  ctx.font = 'bold 7px sans-serif';
  ctx.fillStyle = '#1e3a8f';
  ctx.textAlign = 'center';
  ctx.translate(0, police.h/2-11);
  ctx.rotate(Math.PI);
  ctx.fillText('POLICIE', 0, 0);
  ctx.restore();
  ctx.restore();
}

function loop(){
  updatePlayer();
  updatePolice();
  checkStuck();
  checkCollision();
  ctx.clearRect(0,0,W,H);
  drawCity(car.x, car.y);
  drawPolice();
  drawCar();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
